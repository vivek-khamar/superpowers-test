spring.application.name=test

spring.datasource.url=jdbc:postgresql://localhost:5432/superpowers_test
spring.datasource.username=superpowers_test
spring.datasource.password=superpowers_test

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration

app.rate-limit.signup.max-requests=10
app.rate-limit.signup.window-seconds=60
app.rate-limit.signup.path=/api/v1/auth/signup

# Must be overridden via APP_JWT_SECRET env var in any non-local environment.
app.jwt.secret=local-dev-only-secret-32-bytes-minimum-please-override
app.jwt.expiration-seconds=86400

# Onboarding file uploads — infra-level safety net, not a business rule.
# The 5MB resume cap and file-type checks are enforced in OnboardingService.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

# Must be overridden via env vars in any non-local environment.
app.aws.s3.bucket-name=superpowers-test-onboarding
app.aws.s3.region=us-east-1
app.aws.s3.endpoint-override=
